<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Elite Performance Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet">
    <style>
        /* BRAND ARCHITECTURE */
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
            width: 90%;
        }

        /* LOGO ASSET */
        .logo-box {
            margin: 0 auto 1.5rem auto;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .logo-img {
            width: 100%;
            max-width: 380px;
            height: auto;
            filter: drop-shadow(0px 4px 20px rgba(212, 175, 55, 0.4));
        }

        /* TYPOGRAPHY */
        h1 {
            color: #D4AF37;
            font-weight: 700;
            font-size: clamp(1.2rem, 6vw, 1.7rem);
            letter-spacing: 0.25em; 
            text-transform: uppercase;
            margin: 1.5rem 0 0 0;
            line-height: 1.4;
        }

        p.subtitle {
            font-size: 1rem;
            color: #C0C0C0;
            margin-top: 0.5rem;
            font-weight: 300;
            letter-spacing: 0.1em;
        }

        /* LEAD CAPTURE BLOCK - LIVE HOOKED */
        .form-container {
            margin-top: 3.5rem;
            background: #0a0a0a;
            padding: 2.5rem;
            border-top: 1px solid #D4AF37;
            border-bottom: 1px solid #D4AF37;
        }

        .form-instruction {
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            color: #888;
            letter-spacing: 0.05em;
        }

        input[type="email"] {
            width: 100%;
            max-width: 300px;
            padding: 16px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            margin-bottom: 1.5rem;
            text-align: center;
            font-family: inherit;
            border-radius: 0;
            outline: none;
            font-size: 1rem;
        }

        input[type="email"]:focus {
            border-color: #D4AF37;
        }

        button {
            background-color: #D4AF37;
            color: #000;
            border: none;
            padding: 18px 45px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        button:hover {
            background-color: #FBF5B7;
            letter-spacing: 0.2em;
            transform: scale(1.02);
        }

        /* ORIGIN DATA */
        .footer-text {
            font-size: 0.75rem;
            color: #333;
            margin-top: 5rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="edited-image.png" alt="Elite Performance Protocol" class="logo-img">
        </div>

        <h1>Elite Performance Protocol</h1>
        <p class="subtitle">Structural Calibration for the Lexus Executive</p>

        <div class="form-container">
            <p class="form-instruction">Enter your executive email to initialize the <br><strong>5-Minute Neural Reboot</strong></p>
            
            <form action="https://formspree.io/f/mjgjvwqo" method="POST">
                <input type="email" name="email" placeholder="EXECUTIVE EMAIL" required>
                <br>
                <button type="submit">Initialize Protocol</button>
            </form>
        </div>

        <div class="footer-text">
            BY SFB.LLC SINCE 2002 | NAPLES, FL | DC
        </div>
    </div>

</body>
</html>
