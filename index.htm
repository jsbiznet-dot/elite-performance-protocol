<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Apex Driver | Elite Performance Protocol</title>
    <style>
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        .container { 
            text-align: center; 
            padding: 20px; 
            max-width: 450px; 
            width: 90%; 
        }
        .logo-box {
            margin-bottom: 30px;
        }
        .logo-box img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid #1a1a1a;
        }
        h1 { 
            font-size: 2.2rem; 
            margin-bottom: 20px; 
            font-weight: 700; 
            line-height: 1.1; 
            letter-spacing: -1px;
        }
        p { 
            color: #888; 
            margin-bottom: 35px; 
            line-height: 1.6; 
            font-size: 1.1rem; 
        }
        input[type="email"] { 
            width: 100%; 
            padding: 18px; 
            margin-bottom: 15px; 
            border: 1px solid #333; 
            background: #111; 
            color: #fff; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 1rem; 
            text-align: center;
        }
        input[type="email"]:focus {
            outline: none;
            border-color: #D4AF37;
        }
        button { 
            width: 100%; 
            padding: 20px; 
            background-color: #D4AF37; 
            color: #000; 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            transition: all 0.3s ease; 
            font-size: 1rem; 
        }
        button:hover { 
            background-color: #f1c40f; 
            transform: translateY(-1px);
        }
        #status {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #D4AF37;
            letter-spacing: 1px;
            text-transform: uppercase;
            min-height: 1em;
        }
        .footer { 
            margin-top: 50px; 
            font-size: 0.7rem; 
            color: #333; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="edited-image.png" alt="Elite Performance Protocol Badge">
        </div>

        <h1>THE APEX DRIVER</h1>
        <p>Calibrate your structural alignment and cognitive focus in real-time. Designed for the high-performance operator.</p>
        
        <form id="apex-form">
            <input type="email" name="email" id="email" placeholder="EXECUTIVE EMAIL ADDRESS" required>
            
            <input type="hidden" name="_subject" value="Protocol Initialization: Germain Lexus Lead">
            
            <button type="submit" id="submit-btn">Initialize Protocol</button>
        </form>

        <div id="status"></div>

        <div class="footer">© 2026 SCARLETT FITNESS BIZ LLC | APEX DRIVER DIVISION</div>
    </div>

    <script>
        const form = document.getElementById("apex-form");
        const status = document.getElementById("status");
        const btn = document.getElementById("submit-btn");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            
            // UI Feedback
            btn.disabled = true;
            btn.innerText = "CALIBRATING...";
            status.innerHTML = "ESTABLISHING SECURE CONNECTION...";
            
            const data = new FormData(e.target);
            
            fetch("https://formspree.io/f/mjgjvwqo", {
                method: "POST",
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    // Manual redirect to bypass Formspree $10 fee
                    window.location.href = "success.html";
                } else {
                    btn.disabled = false;
                    btn.innerText = "INITIALIZE PROTOCOL";
                    status.innerHTML = "SYSTEM ERROR. PLEASE TRY AGAIN.";
                }
            }).catch(error => {
                btn.disabled = false;
                btn.innerText = "INITIALIZE PROTOCOL";
                status.innerHTML = "CONNECTION FAILED.";
            });
        });
    </script>

</body>
</html>
