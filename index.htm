<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Elite Performance Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
        }

        /* LOGO STYLING */
        .logo-box {
            margin-bottom: 1.5rem;
        }

        .logo-img {
            max-width: 280px;
            height: auto;
            /* Subtle drop shadow to simulate a physical badge */
            filter: drop-shadow(0px 4px 10px rgba(212, 175, 55, 0.2));
        }

        /* HEADLINE STYLING */
        h1 {
            color: #D4AF37;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 0.25em; /* Executive Tracking */
            text-transform: uppercase;
            margin: 0;
        }

        p.subtitle {
            font-size: 1rem;
            color: #C0C0C0; /* Brushed Silver */
            margin-top: 0.5rem;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        /* FORM STYLING */
        .form-container {
            margin-top: 3rem;
            background: #111111;
            padding: 2rem;
            border-top: 1px solid #D4AF37;
        }

        input[type="email"] {
            width: 80%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            margin-bottom: 1rem;
            text-align: center;
        }

        button {
            background-color: #D4AF37;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #FBF5B7; /* Shimmer effect */
            transform: translateY(-2px);
        }

        .footer-text {
            font-size: 0.7rem;
            color: #444;
            margin-top: 4rem;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="edited-image.png" alt="Elite Performance" class="logo-img">
        </div>

        <h1>Elite Performance Protocol</h1>
        <p class="subtitle">Structural Calibration for the Lexus Executive</p>

        <div class="form-container">
            <p>Access the 5-Minute System Reboot Audio & The Evidence Exhibit</p>
            <form action="YOUR_MAILCHIMP_OR_CONVERTKIT_URL" method="POST">
                <input type="email" name="EMAIL" placeholder="EXECUTIVE EMAIL" required>
                <br>
                <button type="submit">Initialize Reboot</button>
            </form>
        </div>

        <div class="footer-text">
            BY SFB.LLC SINCE 2002 | NAPLES, FL | DC
        </div>
    </div>

</body>
</html>
