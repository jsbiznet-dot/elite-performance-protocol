<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocol Active | The Apex Driver</title>
    <style>
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        .container { 
            text-align: center; 
            padding: 30px; 
            max-width: 450px; 
            width: 90%; 
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            background: #0a0a0a;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
        }
        .status-light {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #00ff00;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px #00ff00;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .status-text {
            color: #00ff00;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        h2 { 
            font-size: 1.6rem; 
            margin-bottom: 10px; 
            font-weight: 700;
            letter-spacing: 1px;
        }
        p.subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        audio { 
            width: 100%; 
            margin-bottom: 40px; 
            filter: invert(90%) hue-rotate(180deg) brightness(1.5); 
        }
        .upsell-card { 
            border-top: 1px solid #222; 
            padding-top: 30px; 
            margin-top: 10px; 
        }
        .upsell-card h3 { 
            color: #D4AF37; 
            font-size: 1.1rem; 
            margin-bottom: 10px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .upsell-card p {
            font-size: 0.85rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .price-tag {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #fff;
        }
        .buy-btn { 
            display: block;
            width: 100%; 
            padding: 18px; 
            background-color: #ffffff; 
            color: #000; 
            text-decoration: none;
            border-radius: 4px; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .buy-btn:hover { 
            background-color: #D4AF37; 
            transform: translateY(-2px);
        }
        .coming-soon {
            margin-top: 15px;
            font-size: 0.65rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .footer { 
            margin-top: 40px; 
            font-size: 0.6rem; 
            color: #222; 
            letter-spacing: 1px; 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-text"><span class="status-light"></span> Protocol Active</div>
        
        <h2>COMMUTE COACH: TAKE 1</h2>
        <p class="subtitle">5-Minute In-Motion Calibration</p>
        
        <audio controls controlsList="nodownload">
            <source src="protocol.m4a" type="audio/x-m4a">
            Your browser does not support the audio element.
        </audio>

        <div class="upsell-card">
            <h3>The Core Manual</h3>
            <p>Master the 10-point structural alignment protocol and the geometric seat-setting blueprint.</p>
            <div class="price-tag">$39</div>
            
            <a href="YOUR_PAYMENT_LINK_HERE" class="buy-btn">Download Full Manual</a>
            <div class="coming-soon">Metabolic Fueling Guide: Deployment in Progress</div>
        </div>

        <div class="footer">AUTHENTICATED ACCESS | THE APEX DRIVER</div>
    </div>

</body>
</html>
